# Dependabot configuration for code-delegation-harness
# Keeps dependencies up to date, with a focus on security.

version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Python / pip (pyproject.toml + requirements if any)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Group security updates
    groups:
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"
